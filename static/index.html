<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TDEElytics</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header glass">
            <div class="header-logo">
                <div class="logo-mark"></div>
                <h1>TDEElytics</h1>
            </div>
            <div class="header-controls">
                <span id="welcome-msg" style="margin-right: 12px; font-weight: 500; align-self: center;"></span>
                <select id="user-select" class="dropdown-glass">
                    <option value="default">Default User</option>
                    <option value="guest">Guest Profile</option>
                    <option value="new">+ Add User</option>
                </select>
                <select id="goal-select" class="dropdown-glass">
                    <option value="lose_1_0">Lose 1.0kg/w</option>
                    <option value="lose_0_5">Lose 0.5kg/w</option>
                    <option value="lose_0_25">Lose 0.25kg/w</option>
                    <option value="maintain" selected>Maintain Weight</option>
                    <option value="gain_0_25">Gain 0.25kg/w</option>
                    <option value="gain_0_5">Gain 0.5kg/w</option>
                </select>
            </div>
        </header>

        <!-- Stats Bar -->
        <div class="stats-bar glass">
            <div class="stat-pill">
                <span class="stat-label">Est. TDEE</span>
                <span class="stat-value" id="header-tdee">--</span>
            </div>
            <div class="stat-pill highlight-pill">
                <span class="stat-label">Daily Target</span>
                <span class="stat-value" id="header-target">--</span>
            </div>
            <div class="stat-pill">
                <span class="stat-label">Trend Wt</span>
                <span class="stat-value" id="header-trend">--</span>
            </div>
        </div>

        <!-- Main Content -->
        <main class="content">

            <!-- Quick Log Card -->
            <section class="card glass entry-card">
                <div class="card-header">
                    <h2>Log Today</h2>
                    <span class="date-display" id="current-date"></span>
                </div>
                <form id="log-form" class="log-form">
                    <input type="hidden" id="entry-date" name="date">

                    <div class="input-group weight-group">
                        <label for="weight">Weight (kg)</label>
                        <input type="number" id="weight" name="weight" step="0.1" required placeholder="0.0">
                    </div>

                    <div class="macros-grid">
                        <div class="input-group calories-group">
                            <label for="calories">Calories</label>
                            <input type="number" id="calories" name="calories" required placeholder="0">
                        </div>
                        <div class="input-group">
                            <label for="protein">Protein (g)</label>
                            <input type="number" id="protein" name="protein" placeholder="0">
                        </div>
                        <div class="input-group">
                            <label for="carbs">Carbs (g)</label>
                            <input type="number" id="carbs" name="carbs" placeholder="0">
                        </div>
                        <div class="input-group">
                            <label for="fats">Fats (g)</label>
                            <input type="number" id="fats" name="fats" placeholder="0">
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">
                        <span>Save Entry</span>
                        <div class="loader hidden"></div>
                    </button>
                </form>
            </section>

            <!-- Time Range Toggles -->
            <div class="time-toggles glass">
                <button class="toggle-btn active" data-range="14">2W</button>
                <button class="toggle-btn" data-range="30">1M</button>
                <button class="toggle-btn" data-range="90">3M</button>
                <button class="toggle-btn" data-range="all">All</button>
            </div>

            <!-- Charts Section -->
            <section class="charts-container">
                <div class="card glass chart-card">
                    <div class="card-header">
                        <h2>Weight Trend</h2>
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="weightChart"></canvas>
                    </div>
                </div>

                <div class="card glass chart-card">
                    <div class="card-header">
                        <h2>Nutrition Timeline</h2>
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="macroChart"></canvas>
                    </div>
                </div>
                <!-- Settings Section -->
                <section class="card glass settings-card">
                    <div class="card-header">
                        <h2>Settings</h2>
                    </div>
                    <button id="btn-reset" class="btn-danger">Reset All Data For This User</button>
                </section>
        </main>

        <!-- PIN Modal Overlay -->
        <div id="pin-modal" class="modal-overlay hidden">
            <div class="modal-card glass">
                <h2 id="pin-title">Enter PIN</h2>
                <p id="pin-desc">Enter your 4-digit PIN to access this profile.</p>
                <input type="password" id="pin-input" maxlength="4" placeholder="----">
                <div class="modal-actions">
                    <button id="btn-pin-submit" class="btn-primary">Submit</button>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="toast hidden">
            <span id="toast-message">Success!</span>
        </div>
    </div>

    <!-- JS -->
    <script src="app.js"></script>
</body>

</html>
